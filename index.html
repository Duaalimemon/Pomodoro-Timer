<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Pomodoro Timer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="timer-container">
        
        <div class="status-badge-wrap">
            <span id="status-badge" class="badge work">Focus Session</span>
        </div>

        <div class="timer-circle">
            <svg class="progress-ring" width="240" height="240">
                <circle class="progress-ring__bg" stroke="#1e293b" stroke-width="8" fill="transparent" r="110" cx="120" cy="120"/>
                <circle id="progress-indicator" class="progress-ring__bar" stroke="#38bdf8" stroke-width="8" fill="transparent" r="110" cx="120" cy="120"/>
            </svg>
            <div class="time-display" id="time-string">25:00</div>
        </div>

         <div class="settings-panel">
    <div class="input-group">
        <label for="input-work">Focus (Min)</label>
        <input type="number" id="input-work" value="25" min="1" max="60">
    </div>
    <div class="input-group">
        <label for="input-break">Break (Min)</label>
        <input type="number" id="input-break" value="5" min="1" max="60">
    </div>
</div>

<div class="control-grid">
    <button id="start-pause-btn" class="btn primary-btn">Start Session</button>
    <button id="reset-btn" class="btn secondary-btn">Reset</button>
</div>

    </div>

   <audio id="alarm-sound" src="https://www.soundjay.com/buttons/sounds/beep-06.mp3" preload="auto"></audio>

    <script src="app.js"></script>
</body>
</html>
